name: E2E Tests

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      REDISMS_DISABLE_POSTINSTALL: 1
      STORAGE_ADAPTER: LOCAL
      DOCUMENTS_ADAPTER: LOCAL
      LLM_PROVIDER: AI_GATEWAY
      SESSION_SECRET: e2e-test-secret-not-for-production
      SUPER_ADMIN_GITHUB_ID: "99999"
      AUTH_CALLBACK_URL: http://localhost:5173/auth/callback
      DOCUMENT_DB_CONNECTION_STRING: localhost:27017
      DOCUMENT_DB_USERNAME: ci_user
      DOCUMENT_DB_PASSWORD: ci_password
      DOCUMENT_DB_LOCAL: "true"
      REDIS_LOCAL: "true"
      NODE_ENV: development

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Start MongoDB replica set
        uses: ./.github/actions/start-mongodb

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: e2e

      - name: Wait for services
        run: |
          for i in {1..30}; do
            if nc -z localhost 6379 && nc -z localhost 27017; then
              echo "redis and mongo are up"
              exit 0
            fi
            echo "waiting for services... ($i/30)"
            sleep 2
          done
          echo "services failed to start" && exit 1

      - name: Build app
        run: yarn app:build
        env:
          NODE_ENV: production

      - name: Start app server
        run: yarn app:prod &
        env:
          NODE_ENV: production

      - name: Wait for app server
        run: |
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5173 | grep -q "200"; then
              echo "app is up"
              exit 0
            fi
            echo "waiting for app... ($i/30)"
            sleep 2
          done
          echo "app failed to start" && exit 1

      - name: Seed database
        run: yarn seeds

      - name: Run e2e tests
        run: yarn test:e2e

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
