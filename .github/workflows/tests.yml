name: CI — typecheck & tests

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      REDISMS_DISABLE_POSTINSTALL: 1

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Start MongoDB replica set
        uses: ./.github/actions/start-mongodb

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          BULLMQ_PRO_TOKEN: ${{ secrets.BULLMQ_PRO_TOKEN }}

      - name: Wait for services
        run: |
          for i in {1..30}; do
            if nc -z localhost 6379 && nc -z localhost 27017; then
              echo "redis and mongo are up"
              exit 0
            fi
            echo "waiting for services... ($i/30)"
            sleep 2
          done
          echo "services failed to start" && exit 1

      - name: TypeScript type check
        run: yarn typecheck

      - name: Restore Prettier cache
        uses: actions/cache@v4
        with:
          path: .prettiercache
          key: prettier-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: prettier-${{ runner.os }}-

      - name: Check formatting
        run: yarn prettier --check --cache --cache-location .prettiercache .

      - name: Restore ESLint cache
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: eslint-${{ runner.os }}-

      - name: Lint
        run: yarn eslint --cache --cache-location .eslintcache .

      - name: Run tests with coverage
        run: yarn test:coverage

      - name: Build app
        run: yarn app:build
        env:
          BULLMQ_PRO_TOKEN: ${{ secrets.BULLMQ_PRO_TOKEN }}
