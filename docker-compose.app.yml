services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
      - .env.docker
    environment:
      - OTEL_SERVICE_NAME=sandpiper
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=production
    ports:
      - "5173:5173"
    depends_on:
      - redis
      - mongodb

  workers:
    build:
      dockerfile: workers/Dockerfile
    env_file:
      - .env
      - .env.docker
    environment:
      - OTEL_SERVICE_NAME=sandpiper
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=production
    depends_on:
      - redis
      - mongodb
